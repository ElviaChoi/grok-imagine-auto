<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grok Video Auto</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="top">
        <h1>🎬 Grok Video Auto</h1>
        <p class="hint">장면별 이미지와 프롬프트를 넣으면 선택한 설정으로 순서대로 생성하고 저장합니다.</p>
      </header>

      <section class="action-panel action-panel-primary" aria-label="빠른 작업">
        <div class="action-panel-head">
          <strong>빠른 작업</strong>
          <span>장면 수를 맞추거나 바로 추가</span>
        </div>
        <div class="scene-toolbar scene-toolbar-main">
          <button
            id="addScene"
            type="button"
            class="secondary action-button action-button-strong"
            title="맨 아래에 새 장면을 추가합니다. 마지막 장면 뒤에 이미지와 프롬프트를 바로 넣을 수 있습니다."
          >
            <strong>장면 추가</strong>
          </button>
          <button
            id="make20"
            type="button"
            class="secondary action-button"
            title="장면 개수를 20개로 맞춥니다. 부족하면 자동 추가하고, 많으면 아래쪽부터 정리합니다."
          >
            <strong>20개로 맞추기</strong>
          </button>
        </div>
      </section>

      <section class="action-panel action-panel-clear" aria-label="정리 작업">
        <div class="action-panel-head">
          <strong>정리 작업</strong>
          <span>입력값만 지우고 장면 구조는 유지</span>
        </div>
        <div class="scene-toolbar scene-toolbar-soft" role="group" aria-label="부분 정리">
          <button
            id="clearPromptsOnly"
            type="button"
            class="secondary action-button"
            title="모든 장면의 프롬프트만 지웁니다. 이미지 파일은 유지됩니다."
          >
            <strong>프롬프트만 지우기</strong>
          </button>
          <button
            id="clearImagesOnly"
            type="button"
            class="secondary action-button"
            title="모든 장면의 이미지 선택만 지웁니다. 프롬프트는 유지됩니다."
          >
            <strong>이미지만 지우기</strong>
          </button>
        </div>
        <div class="scene-toolbar scene-toolbar-danger" role="group" aria-label="전체 정리">
          <button
            id="clearPromptsAndImages"
            type="button"
            class="secondary danger action-button"
            title="모든 장면에서 프롬프트와 이미지 선택을 함께 지웁니다."
          >
            <strong>프롬프트 + 이미지<br>지우기</strong>
          </button>
          <button
            id="clearAllScenes"
            type="button"
            class="secondary danger action-button"
            title="모든 장면을 비우고 기본 장면 한 줄만 남깁니다."
          >
            <strong>장면 전부 비우기</strong>
          </button>
        </div>
      </section>

      <details class="bulk-import">
        <summary>CSV/TSV로 장면 채우기</summary>
        <div class="import-grid">
          <label class="field compact">
            <span>표 파일</span>
            <input id="tableFile" type="file" accept=".csv,.tsv,.txt,text/csv,text/tab-separated-values">
          </label>
          <label class="field compact">
            <span>이미지 묶음</span>
            <input id="bulkImages" type="file" accept="image/*" multiple>
          </label>
        </div>
        <button id="importScenes" type="button" class="secondary">파일 내용으로 채우기</button>
        <p class="import-help">CSV는 UTF-8을 권장합니다. 권장 헤더는 <code>image,prompt</code> 입니다.</p>
      </details>

      <section class="generation-settings" aria-label="생성 설정">
        <div class="segmented wide" data-setting="sourceType">
          <span>입력</span>
          <button type="button" data-value="imagePrompt">이미지+프롬프트</button>
          <button type="button" data-value="promptOnly">프롬프트만</button>
        </div>
        <div class="segmented" data-setting="mode">
          <span>생성</span>
          <button type="button" data-value="image">이미지</button>
          <button type="button" data-value="video">비디오</button>
        </div>
        <div class="segmented image-only" data-setting="imageQuality">
          <span>품질</span>
          <button type="button" data-value="speed">속도</button>
          <button type="button" data-value="quality">퀄리티</button>
        </div>
        <p class="image-save-note image-only">
          <strong>자동 저장</strong>
          <span>첫 번째 이미지만 자동 저장하고, 나머지는 Grok 화면에서 직접 저장합니다.</span>
        </p>
        <div class="segmented" data-setting="resolution">
          <span>해상도</span>
          <button type="button" data-value="480p">480p</button>
          <button type="button" data-value="720p">720p</button>
        </div>
        <div class="segmented" data-setting="duration">
          <span>길이</span>
          <button type="button" data-value="6s">6s</button>
          <button type="button" data-value="10s">10s</button>
        </div>
        <div class="segmented aspect-options" data-setting="aspectRatio">
          <span>비율</span>
          <button type="button" data-value="16:9">16:9</button>
          <button type="button" data-value="9:16">9:16</button>
          <button type="button" data-value="1:1">1:1</button>
          <button type="button" data-value="2:3">2:3</button>
          <button type="button" data-value="3:2">3:2</button>
        </div>
      </section>

      <section id="sceneList" class="scene-list" aria-label="장면 목록"></section>

      <section class="settings">
        <div class="row">
          <label class="field small">
            <span>파일명 접두사</span>
            <input id="prefix" type="text" value="grok-video">
          </label>
          <label class="field small">
            <span>시작 번호</span>
            <input id="startIndex" type="number" min="1" value="1">
          </label>
        </div>

        <label class="check video-only">
          <input id="upscale" type="checkbox" checked>
          <span>생성 후 업스케일 시도</span>
        </label>

        <section id="recoveryPanel" class="recovery-panel" hidden>
          <strong>중단된 작업</strong>
          <p id="recoveryText"></p>
          <div class="recovery-buttons">
            <button id="resumeSession" type="button" class="secondary">이어하기</button>
            <button id="retryScene" type="button" class="secondary">다시 시도</button>
            <button id="skipScene" type="button" class="secondary">건너뛰기</button>
            <button id="clearSession" type="button" class="secondary danger">기록 삭제</button>
          </div>
        </section>

        <div class="buttons">
          <button id="start">시작</button>
          <button id="stop" class="secondary">중지</button>
        </div>

        <pre id="status">대기 중</pre>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
